{% extends "base.html" %}

{% block title %}Nouveau Mot de passe - Occaz' Gaming{% endblock %}

{% block content %}

<div class="max-w-md mx-auto px-6 py-12 text-zinc-900 dark:text-white">
    <div class="bg-white dark:bg-zinc-900 border border-gray-200 dark:border-gray-800 rounded-xl p-8 shadow-lg">
        
        <h1 class="text-2xl font-black mb-2">Choisir un nouveau mot de passe</h1>
        <p class="text-xs text-gray-500 dark:text-gray-400 mb-6">Modification du compte lié à : <span class="text-blue-500 font-semibold">{{ email }}</span></p>

        <form action="{{ url_for('auth_mot_de_passe.reinitialiser_page', email_user=email) }}" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-medium mb-2">Nouveau mot de passe</label>
                <input type="password" name="password" required placeholder="••••••••" 
                       class="w-full text-sm bg-gray-50 dark:bg-zinc-950 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2.5 focus:outline-none focus:border-blue-500">
                <label class="block text-sm font-medium mb-2">Confirmer le mot de passe</label>
                <input type="password" name="password_confirm" required placeholder="••••••••" 
                       class="w-full text-sm bg-gray-50 dark:bg-zinc-950 border border-gray-300 dark:border-gray-700 rounded-lg px-3 py-2.5 focus:outline-none focus:border-blue-500">
            </div>

            <button type="submit" class="w-full py-2.5 bg-blue-600 hover:bg-blue-500 text-white font-bold text-sm rounded-lg shadow-md transition">
                💾 Sauvegarder le mot de passe
            </button>
        </form>

    </div>
</div>
{% endblock %}
