<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mon Site Sombre{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans antialiased min-h-screen flex flex-col">

    <header class="sticky top-0 z-50 backdrop-blur-md bg-black/70 border-b border-gray-800 px-6 py-4 flex justify-between items-center">
        <a href="/" class="text-xl font-bold tracking-wider hover:text-gray-300 transition">MON_LOGO</a>
        
        <nav class="hidden md:flex space-x-8 text-sm font-medium text-gray-400">
            <a href="/" class="hover:text-white transition">Accueil</a>
            <a href="#" class="hover:text-white transition">Fonctionnalités</a>
        </nav>

        <div class="flex items-center space-x-4">
            <a href="/parametres" class="p-2 text-gray-400 hover:text-white transition rounded-full hover:bg-gray-900 flex items-center justify-center" title="Paramètres">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z" />
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                </svg>
            </a>

            <a href="/connexion" class="text-sm font-medium text-gray-300 hover:text-white px-4 py-2 rounded-lg border border-gray-700 hover:border-gray-500 transition bg-zinc-900">
                Connexion
            </a>
        </div>
    </header>

    <main class="flex-grow">
        {% block content %}
        {% endblock %}
    </main>

</body>
</html>
